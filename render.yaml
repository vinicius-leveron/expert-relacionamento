services:
  - type: web
    name: perpetuo-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: cd apps/api && npx tsx src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
